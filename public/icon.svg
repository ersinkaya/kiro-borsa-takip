<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Yükselen grafik çizgisi -->
  <polyline points="80,360 160,300 220,330 300,210 380,250 440,140"
            fill="none" stroke="url(#green)" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mum çubukları (alt) -->
  <rect x="100" y="380" width="28" height="60" fill="#10b981" rx="4"/>
  <rect x="180" y="370" width="28" height="70" fill="#ef4444" rx="4"/>
  <rect x="260" y="360" width="28" height="80" fill="#10b981" rx="4"/>
  <rect x="340" y="350" width="28" height="90" fill="#10b981" rx="4"/>
  <rect x="420" y="340" width="28" height="100" fill="#10b981" rx="4"/>
  <!-- BT harfleri -->
  <text x="256" y="180" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="120" fill="#ffffff" text-anchor="middle">BT</text>
</svg>
